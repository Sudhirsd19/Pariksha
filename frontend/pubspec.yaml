name: quantum_index
description: Algorithmic Trading App for QuantumIndex.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  fl_chart: ^0.63.0
  intl: ^0.18.1
  shared_preferences: ^2.2.0
  logger: ^2.0.1
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.3.1"

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter_native_splash:
  color: "#0F0F1A"
  image: assets/logo.png
  android_12:
    image: assets/logo.png
    color: "#0F0F1A"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
